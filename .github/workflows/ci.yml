name: CI

on:
  push:
  pull_request:

jobs:
  build-and-replay:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          cmake --version
          c++ --version
          lake --version

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja

      - name: Build cross_validate
        run: cmake --build build --target cross_validate

      - name: Build Lean targets
        run: |
          lake build
          lake build peering-replay

      - name: Randomized lean-core replay fuzz
        run: |
          python3 scripts/replay_fuzz.py \
            --profile lean-core \
            --cycles 128 \
            --event-range 32 512 \
            --stop-on-first-failure \
            --save-failure-traces artifacts/lean-core-fuzz \
            --require-cpp-image-invariant

      - name: Randomized full-profile replay fuzz
        run: |
          python3 scripts/replay_fuzz.py \
            --profile full \
            --cycles 8 \
            --event-range 32 512 \
            --stop-on-first-failure \
            --save-failure-traces artifacts/full-fuzz

      - name: Upload replay artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: artifacts
          retention-days: 3
